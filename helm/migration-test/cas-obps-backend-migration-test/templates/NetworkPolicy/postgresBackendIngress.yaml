kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ include "cas-obps-backend-migration-test.fullname" . }}-postgres-backend-ingress
  labels: {{ include "cas-obps-backend-migration-test.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cas-obps-backend-migration-test.fullname" . }}
      component: backend
  ingress:
  - from:
    - podSelector:
        matchLabels:
          release: {{ .Values.backend.database.releaseName }}
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: {{ .Values.backend.database.appName }}
