{{- if .Values.enable_pdb }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "cas-bciers.fullname" . }}-administration-frontend-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: cas-bciers
      component: administration-frontend
{{- end }}
