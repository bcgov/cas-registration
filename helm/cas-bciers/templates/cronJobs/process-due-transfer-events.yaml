apiVersion: batch/v1
kind: CronJob
metadata:
  name: process-due-transfer-events
  labels: {{- include "cas-bciers.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
spec:
  suspend: true # This cron job is intended to be triggered manually by Airflow
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels: {{ include "cas-bciers.labels" . | nindent 12 }}
            component: job-with-database-access
        spec:
          activeDeadlineSeconds: 600
          restartPolicy: Never
          serviceAccountName: deployer
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: process-due-transfer-events
            image: "{{ .Values.backend.image.repository }}:{{ .Chart.AppVersion | default .Values.backend.image.tag }}"
            imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
            securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            env:
              {{- include "cas-bciers.backendEnvVars" . | nindent 14 }}
            command:
              - /usr/bin/env
              - bash
              - -c
              - |
                set -euo pipefail;
                .venv/bin/python manage.py process_due_transfer_events
