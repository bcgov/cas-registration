dependencies:
  override: []

review:
  checklist:
    - In the "test" namespace, did you check for orphan migration test resources?


deploy:
  override:
    - ./deploy.sh:
        timeout: 1800

ci:
  allow_failures:
    - "test-code / yarn-audit"
    - "Happo (cas-administration)"
    - "Happo (cas-compliance)"
    - "Happo (cas-registration)"
    - "Happo (cas-reporting)"
