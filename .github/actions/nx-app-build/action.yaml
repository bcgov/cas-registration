name: "Build and push Docker image for Nx frontend app in /bciers directory"
description: "Reusable action to build and push a Docker image for an Nx app in the /bciers directory"

inputs:
  project:
    description: "Nx project name"
    required: true
  image_url:
    description: "Docker image URL"
    required: true
  github_token:
    description: "GitHub token"
    required: true
  host_administration:
    description: "Host for administration - only used for e2e CI builds"
    required: false
  host_compliance:
    description: "Host for compliance - only used for e2e CI builds"
    required: false
  host_registration:
    description: "Host for registration - only used for e2e CI builds"
    required: false
  host_reporting:
    description: "Host for reporting - only used for e2e CI builds"
    required: false
  special_build_tag:
    description: "Extra tag to use for the image (e.g. nightly, latest)"
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ inputs.image_url }}
        tags: |
          type=sha,format=long,prefix=
          type=ref,event=pr
          ${{ inputs.special_build_tag == 'nightly' && 'type=schedule,pattern=nightly' || '' }}
          ${{ inputs.special_build_tag == 'latest' && 'latest' || '' }}
    - name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github_token }}
    - name: Install dependencies
      shell: bash
      run: |
        corepack enable
        yarn install --immutable
        cd bciers && yarn install --immutable
    - uses: actions/setup-node@v6
    - name: Derive appropriate SHAs for base and head for `nx affected` commands
      uses: nrwl/nx-set-shas@v5
      with:
        main-branch-name: "develop"
    - name: Cache Docker layers
      uses: actions/cache@v5
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-bciers-${{ inputs.project }}${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-bciers-${{ inputs.project }}
    - name: Set app version
      id: app_version
      shell: bash
      run: |
        VERSION=$(grep '^appVersion:' helm/cas-bciers/Chart.yaml | sed 's/appVersion: "\(.*\)"/\1/')
        echo "value=${VERSION}" >> $GITHUB_OUTPUT
    - name: Get Node version from .tool-versions
      id: node_version
      run: |
        NODE_VERSION=$(grep '^nodejs ' ./.tool-versions | awk '{print $2}')
        echo "value=${NODE_VERSION}" >> $GITHUB_OUTPUT
      shell: bash
    - name: Build images
      shell: bash
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_PUSH: true
        INPUT_TAGS: ${{ steps.meta.outputs.tags }}
        INPUT_LABELS: ${{ steps.meta.output.labels }}
        INPUT_CACHE_FROM: type=local,src=/tmp/.buildx-cache
        INPUT_CACHE_TO: type=local,dest=/tmp/.buildx-cache-new
        HOST_ADMINISTRATION: ${{ inputs.host_administration }}
        HOST_COMPLIANCE: ${{ inputs.host_compliance }}
        HOST_REGISTRATION: ${{ inputs.host_registration }}
        HOST_REPORTING: ${{ inputs.host_reporting }}
        PROJECT: ${{ inputs.project }}
        NEXT_PUBLIC_APP_VERSION: ${{ steps.app_version.outputs.value }}
      run: |
        if ! npx nx show projects | grep -qix "$PROJECT"; then
          echo "Project not in allowed project list"
          exit 1
        fi
          npx nx container $PROJECT \
            --build-args=application_path="$PROJECT" \
            --build-args=NODE_VERSION="${{ steps.node_version.outputs.value }}" \
            --skip-nx-cache
      working-directory: ./bciers
      # Temp fix
      # https://github.com/docker/build-push-action/issues/252
      # https://github.com/moby/buildkit/issues/1896
    - name: Move cache
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
